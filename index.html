<!DOCTYPE html>
<html>
    <head>
            <title>Steen papier schaar</title>
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <link rel="stylesheet" href="main.css">
    </head>
    <body>
        <div class="game">
            <div class="results">
                <strong>
                    <p>
                        Computer: <span id="computer"></span>
                    </p>
                    <p>
                        Jouw Keuze: <span id="human"></span>
                    </p>
                    <p>
                        Uitkomst: <span id="result"></span>
                    </p>
                </strong>
            </div>
            <div class="buttons">
                <button id="Steen">🪨</button>
                <button id="Papier">📃</button>
                <button id="Schaar">✂️</button>
            </div>
            <div class="score">
                <strong>
                    Score: <span id="score">0</span>
                </strong>
            </div>
        </div>
    </body>

    <script src="javascript.js"></script>
</html>
